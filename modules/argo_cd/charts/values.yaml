applications:
  - name: example-app # application name in Argo CD
    namespace: default # namespace у Kubernetes
    project: default # Argo CD project name
    source: # application source code
      # repoURL: https://github.com/YOUR_USERNAME/example-repo.git
      repoURL: ${github_repo_url} # link to the Git repository where the Helm chart or Kubernetes manifests are stored
      path: charts/django-app # path within the repository to the desired chart or YAML files
      targetRevision: lesson-8-9 # the Git branch or tag from which to pull the application (e.g., main)
      helm:
        valueFiles: # list of YAML files with settings that will be passed to the Helm chart
          - values.yaml
    destination: # indicates where to deploy the application
      server: https://kubernetes.default.svc # Kubernetes API server address. For an internal cluster, use https://kubernetes.default.svc
      namespace: default # Kkubernetes namespace for this specific application
    syncPolicy: # synchronization policy
      automated: # includes automatic application of changes
        prune: true #remove resources that are no longer described in Git
        selfHeal: true # automatically fix deviations from the Git state if something is changed manually in the cluster

repositories:
  - name: example-app #repository name for internal use
    # url: https://github.com/YOUR_USERNAME/example-repo.git
    url: ${github_repo_url} #full URL of the Git repository
    username: ${github_username} # credentials to access the private repository
    password: ${github_token}

repoConfig:
  insecure: 'true' # allows you to connect to the repository without checking SSL certificates. Not recommended for production
  enableLfs: 'true' # allows the use of Git LFS (Large File Storage) if the repository stores large files
